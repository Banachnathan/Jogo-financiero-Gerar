<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9972A;
    --green: #2ECC8A;
    --green-dark: #1A9966;
    --red: #FF5252;
    --bg: #0D0D12;
    --surface: #16161F;
    --surface2: #1E1E2A;
    --border: rgba(255,255,255,0.06);
    --text: #F0EEF8;
    --muted: #7A7890;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PARTICLES ── */
  #particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }

  /* ── START SCREEN ── */
  #s-start {
    background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(245,200,66,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(46,204,138,0.06) 0%, transparent 60%);
  }

  .logo-coin {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) 0deg, var(--gold-dark) 180deg, var(--gold) 360deg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 36px; font-weight: 800;
    color: #1a0f00;
    box-shadow: 0 0 60px rgba(245,200,66,0.35), 0 0 120px rgba(245,200,66,0.12);
    animation: pulse-coin 3s ease-in-out infinite;
    margin-bottom: 2rem;
  }
  @keyframes pulse-coin {
    0%, 100% { box-shadow: 0 0 60px rgba(245,200,66,0.35), 0 0 120px rgba(245,200,66,0.12); }
    50%       { box-shadow: 0 0 80px rgba(245,200,66,0.55), 0 0 160px rgba(245,200,66,0.2); }
  }

  .game-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 800;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 60%, var(--gold-dark) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    letter-spacing: -2px;
  }

  .game-sub {
    font-size: 1rem; color: var(--muted); text-align: center; margin-bottom: 3rem;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300;
  }

  .start-stats {
    display: flex; gap: 1rem; margin-bottom: 3rem;
  }
  .sstat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.5rem;
    text-align: center;
  }
  .sstat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    color: var(--gold);
  }
  .sstat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }

  .btn-start {
    padding: 1rem 3rem;
    background: var(--gold);
    color: #1a0f00;
    border: none; border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn-start:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 16px 40px rgba(245,200,66,0.4);
  }
  .btn-start:active { transform: scale(0.98); }

  /* ── GAME SCREEN ── */
  #s-game {
    justify-content: flex-start;
    padding-top: 2rem;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(46,204,138,0.05) 0%, transparent 60%);
  }

  .game-header {
    width: 100%; max-width: 680px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .phase-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem; font-weight: 500;
    color: var(--green);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .coin-display {
    display: flex; align-items: center; gap: 0.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--gold);
  }
  .coin-dot {
    width: 20px; height: 20px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #1a0f00; font-weight: 800;
  }

  .progress-track {
    width: 100%; max-width: 680px;
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dark), var(--green));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px rgba(46,204,138,0.5);
  }

  .q-counter {
    font-size: 0.78rem; color: var(--muted);
    text-align: center; margin-bottom: 1rem;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .question-card {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.5;
  }

  .q-text {
    font-size: 1.1rem;
    line-height: 1.65;
    font-weight: 400;
    color: var(--text);
  }

  .options { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 0.75rem; }

  .opt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    width: 100%;
  }
  .opt:hover:not(.disabled) {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.12);
    transform: translateX(4px);
  }
  .opt-letter {
    width: 30px; height: 30px; flex-shrink: 0;
    background: var(--surface2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
  }

  .opt.correct {
    background: rgba(46,204,138,0.1);
    border-color: var(--green);
    transform: none;
  }
  .opt.correct .opt-letter { background: var(--green); color: #001a0e; }
  .opt.wrong {
    background: rgba(255,82,82,0.08);
    border-color: var(--red);
  }
  .opt.wrong .opt-letter { background: var(--red); color: #fff; }
  .opt.disabled { cursor: default; }

  .feedback-box {
    width: 100%; max-width: 680px;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-top: 1rem;
    display: none;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback-box.ok  { background: rgba(46,204,138,0.1);  border: 1px solid rgba(46,204,138,0.3); color: #8FFFD4; display: block; }
  .feedback-box.nok { background: rgba(255,82,82,0.08);  border: 1px solid rgba(255,82,82,0.2);  color: #FFB3B3; display: block; }

  .btn-next {
    margin-top: 1.5rem;
    padding: 0.875rem 2.5rem;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn-next:hover {
    background: var(--gold);
    color: #1a0f00;
    box-shadow: 0 8px 24px rgba(245,200,66,0.3);
  }

  /* ── END SCREEN ── */
  #s-end {
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(245,200,66,0.07) 0%, transparent 70%);
    text-align: center;
  }

  .trophy {
    font-size: 5rem; margin-bottom: 1.5rem;
    animation: bounceIn 0.6s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes bounceIn {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .end-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
    margin-bottom: 0.5rem;
  }
  .end-msg { font-size: 1rem; color: var(--muted); margin-bottom: 2.5rem; max-width: 380px; line-height: 1.6; }

  .end-stats {
    display: flex; gap: 1rem; margin-bottom: 2rem;
  }
  .end-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.25rem 2rem;
  }
  .end-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem; font-weight: 800;
  }
  .end-stat-num.gold { color: var(--gold); }
  .end-stat-num.green { color: var(--green); }
  .end-stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

  .level-badge {
    display: inline-block;
    padding: 0.5rem 1.5rem;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .lb-expert { background: rgba(245,200,66,0.15); border: 1px solid rgba(245,200,66,0.4); color: var(--gold); }
  .lb-adv    { background: rgba(46,204,138,0.15); border: 1px solid rgba(46,204,138,0.4); color: var(--green); }
  .lb-mid    { background: rgba(90,120,255,0.12); border: 1px solid rgba(90,120,255,0.3); color: #8aa4ff; }
  .lb-init   { background: rgba(255,82,82,0.1);   border: 1px solid rgba(255,82,82,0.25); color: #ff9a9a; }

  .end-btns { display: flex; flex-direction: column; gap: 0.75rem; width: 280px; }

  .btn-replay {
    padding: 1rem;
    background: var(--gold);
    color: #1a0f00;
    border: none; border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .btn-replay:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,200,66,0.35); }

  .btn-ghost {
    padding: 1rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  /* ── COINS ANIMATION ── */
  .coin-burst {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 1.5rem;
    animation: burst 1s ease-out forwards;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    50%  { opacity: 1; }
    100% { transform: translate(-50%, calc(-50% - 80px)) scale(1.4); opacity: 0; }
  }

  /* ── STREAK ── */
  .streak-bar {
    display: flex; gap: 6px;
    width: 100%; max-width: 680px;
    margin-bottom: 1.5rem;
  }
  .streak-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .streak-dot.done { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px rgba(46,204,138,0.5); }
  .streak-dot.wrong { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<div id="particles"></div>

<!-- ══ START ══ -->
<div class="screen active" id="s-start">
  <div class="logo-coin">₿</div>
  <h1 class="game-title">Vida<br>Financeira</h1>
  <p class="game-sub">Educação financeira em jogo</p>
  <div class="start-stats">
    <div class="sstat"><div class="sstat-num">10</div><div class="sstat-label">Desafios</div></div>
    <div class="sstat"><div class="sstat-num">3</div><div class="sstat-label">Fases</div></div>
    <div class="sstat"><div class="sstat-num">100</div><div class="sstat-label">Moedas</div></div>
  </div>
  <button class="btn-start" onclick="startGame()">Começar Jogo</button>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="s-game">
  <div class="game-header">
    <span class="phase-pill" id="q-phase">Fase 1</span>
    <div class="coin-display"><div class="coin-dot">M</div><span id="coin-count">0</span></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="streak-bar" id="streak-bar"></div>
  <p class="q-counter" id="q-num">Pergunta 1 de 10</p>
  <div class="question-card"><p class="q-text" id="q-text"></p></div>
  <div class="options" id="q-options"></div>
  <div class="feedback-box" id="feedback"></div>
  <button class="btn-next" id="next-btn" onclick="nextQuestion()">Próxima →</button>
</div>

<!-- ══ END ══ -->
<div class="screen" id="s-end">
  <div class="trophy" id="end-icon">🏆</div>
  <h1 class="end-title" id="end-title">Parabéns!</h1>
  <p class="end-msg" id="end-msg"></p>
  <div class="end-stats">
    <div class="end-stat">
      <div class="end-stat-num green" id="final-score">0/10</div>
      <div class="end-stat-label">Acertos</div>
    </div>
    <div class="end-stat">
      <div class="end-stat-num gold" id="final-coins">0</div>
      <div class="end-stat-label">Moedas</div>
    </div>
  </div>
  <div id="result-badge" style="margin-bottom:2rem"></div>
  <div class="end-btns">
    <button class="btn-replay" onclick="startGame()">Jogar Novamente</button>
    <button class="btn-ghost" onclick="showScreen('s-start')">← Tela Inicial</button>
  </div>
</div>

<script>
const questions = [
  { phase:"Fase 1 — Orçamento", text:"Você ganha R$2.000/mês. Seguindo a regra 50/30/20, quanto deve ir para poupança?", opts:["R$ 200","R$ 400","R$ 600","R$ 1.000"], correct:1, tip:"A regra 50/30/20 indica que 20% deve ser poupado. 20% de R$2.000 = R$400." },
  { phase:"Fase 1 — Orçamento", text:"Maria ganha R$3.000 e gasta R$3.400 por mês. O que isso representa?", opts:["Endividamento","Poupança negativa","Equilíbrio","Consumo consciente"], correct:0, tip:"Gastar mais do que ganha gera dívidas progressivas. Ela precisa cortar gastos urgente." },
  { phase:"Fase 1 — Orçamento", text:"Qual é a melhor definição de 'necessidade' em finanças?", opts:["Roupa de grife","Streaming","Conta de água e luz","Jantar no restaurante"], correct:2, tip:"Necessidades são gastos essenciais: moradia, alimentação, saúde e serviços básicos." },
  { phase:"Fase 2 — Poupança e Juros", text:"Carlos investiu R$1.000 a 10% a.a. com juros compostos. Após 2 anos, quanto ele terá?", opts:["R$ 1.200","R$ 1.210","R$ 1.100","R$ 1.020"], correct:1, tip:"Juros compostos: 1.000×1,1=1.100 (1º ano); 1.100×1,1=1.210 (2º ano). Juros sobre juros!" },
  { phase:"Fase 2 — Poupança e Juros", text:"Para que serve um fundo de emergência?", opts:["Investir na bolsa","Cobrir imprevistos sem se endividar","Pagar férias","Comprar luxos"], correct:1, tip:"O fundo cobre situações inesperadas (demissão, saúde) sem precisar do cartão de crédito." },
  { phase:"Fase 2 — Poupança e Juros", text:"João tem R$500 para investir. Qual opção tem MAIOR liquidez?", opts:["Imóvel","Ações de longo prazo","Tesouro Selic","CDB com 2 anos de carência"], correct:2, tip:"O Tesouro Selic permite resgatar qualquer dia útil sem perda de rentabilidade." },
  { phase:"Fase 3 — Decisões", text:"Ana quer comprar um celular de R$3.000 no cartão em 12x sem juros. O que fazer primeiro?", opts:["Comprar imediatamente","Verificar se cabe no orçamento","Pegar empréstimo","Parcelar ao máximo"], correct:1, tip:"Antes de parcelar, veja se R$250/mês não compromete mais de 30% da sua renda." },
  { phase:"Fase 3 — Decisões", text:"O que são os juros do cartão de crédito rotativo?", opts:["Desconto na fatura","Um dos juros mais altos do Brasil","Taxa de anuidade","Benefício do cartão"], correct:1, tip:"O rotativo pode passar de 300% ao ano! Sempre pague o valor total da fatura." },
  { phase:"Fase 3 — Decisões", text:"Pedro quer ter R$10.000 em 1 ano. Quanto precisa guardar por mês?", opts:["R$ 500","R$ 834","R$ 1.000","R$ 1.200"], correct:1, tip:"R$10.000 ÷ 12 meses ≈ R$834. Definir metas ajuda a planejar quanto e quando guardar." },
  { phase:"Fase 3 — Decisões", text:"Qual atitude representa consumo consciente?", opts:["Comprar por impulso na promoção","Pesquisar e comparar antes de comprar","Usar cheque especial para lazer","Parcelar tudo no cartão"], correct:1, tip:"Consumo consciente = pesquisar, comparar e avaliar se o gasto é realmente necessário." },
];

let current = 0, score = 0, coins = 0, results = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  current = 0; score = 0; coins = 0; results = [];
  buildStreakBar();
  showScreen('s-game');
  renderQuestion();
}

function buildStreakBar() {
  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  questions.forEach(() => {
    const d = document.createElement('div');
    d.className = 'streak-dot';
    bar.appendChild(d);
  });
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-phase').textContent = q.phase;
  document.getElementById('q-num').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('progress').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('coin-count').textContent = coins;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback-box'; fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'Ver Resultado →' : 'Próxima →';

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
    b.onclick = () => answer(i, b);
    opts.appendChild(b);
  });
}

function answer(idx, el) {
  const q = questions[current];
  document.querySelectorAll('.opt').forEach(b => b.classList.add('disabled'));
  const fb = document.getElementById('feedback');
  const dots = document.querySelectorAll('.streak-dot');

  if (idx === q.correct) {
    el.classList.add('correct');
    score++; coins += 10;
    results.push(true);
    dots[current].classList.add('done');
    fb.className = 'feedback-box ok';
    fb.innerHTML = `<strong>✓ Correto!</strong> ${q.tip}`;
    spawnCoins(el);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.opt')[q.correct].classList.add('correct');
    results.push(false);
    dots[current].classList.add('wrong');
    fb.className = 'feedback-box nok';
    fb.innerHTML = `<strong>✗ Incorreto.</strong> ${q.tip}`;
  }

  document.getElementById('coin-count').textContent = coins;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function spawnCoins(el) {
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const span = document.createElement('span');
      span.className = 'coin-burst';
      span.textContent = '+10';
      span.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
      span.style.top  = (rect.top  + rect.height/2) + 'px';
      span.style.color = '#F5C842';
      span.style.fontFamily = "'Syne', sans-serif";
      span.style.fontWeight = '800';
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 1000);
    }, i * 100);
  }
}

function nextQuestion() {
  current++;
  if (current >= questions.length) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  showScreen('s-end');
  document.getElementById('progress').style.width = '100%';
  document.getElementById('final-score').textContent = `${score}/10`;
  document.getElementById('final-coins').textContent = coins;

  let icon, title, msg, badgeClass, badgeText;
  if (score >= 9) {
    icon='🏆'; title='Mestre das Finanças!';
    msg='Você domina educação financeira. Continue investindo no seu conhecimento!';
    badgeClass='lb-expert'; badgeText='Nível: Expert';
  } else if (score >= 7) {
    icon='⭐'; title='Muito Bem!';
    msg='Ótimo resultado! Revise os pontos que errou e você será um expert em breve.';
    badgeClass='lb-adv'; badgeText='Nível: Avançado';
  } else if (score >= 5) {
    icon='📈'; title='Bom Começo!';
    msg='Você está no caminho certo. Estude mais sobre juros compostos e investimentos.';
    badgeClass='lb-mid'; badgeText='Nível: Intermediário';
  } else {
    icon='📚'; title='Continue Aprendendo!';
    msg='Não desanime! Leia os conceitos com atenção e tente novamente.';
    badgeClass='lb-init'; badgeText='Nível: Iniciante';
  }

  document.getElementById('end-icon').textContent = icon;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-msg').textContent = msg;
  document.getElementById('result-badge').innerHTML = `<span class="level-badge ${badgeClass}">${badgeText}</span>`;
}

/* ── particles ── */
function createParticles() {
  const c = document.getElementById('particles');
  const colors = ['#F5C842','#2ECC8A','#a78bfa','#60a5fa'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8 + Math.random()*12}s;
      animation-delay:${Math.random()*10}s;
    `;
    c.appendChild(p);
  }
}
createParticles();
</script>
